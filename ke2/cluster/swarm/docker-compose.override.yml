x-logging:
  &default-logging
  driver: local
  # options:
  #   tag: "docker.{{.Name}}"

x-single-replicated:
  &single-replicated
  mode: replicated
  replicas: 1

x-multi-replicated:
  &multi-replicated
  mode: replicated
  replicas: ${SWARM_REPLICAS:-3}
  placement:
    max_replicas_per_node: 1

# Swarm 構成では postgres コンテナを起動せず外部 DB を前提とするため、DATABASE_URL の指定を必須とする。
# setup_stack.sh は DATABASE_URL を事前に export してから docker compose config を呼ぶため、
# スクリプト経由のセットアップでは発火しない。スクリプト未経由のセットアップで未指定の場合に即エラーで停止する。
x-required-db-env: &required-db-env
  DATABASE_URL: '${DATABASE_URL:?DATABASE_URL must be set: e.g., pgsql://user:password@host:5432/dbname}'

services:
  redis:
    hostname: "re-{{.Node.Hostname}}"
    logging: *default-logging
    deploy: *single-replicated
  rabbitmq:
    hostname: "mq-{{.Node.Hostname}}"
    logging: *default-logging
    configs:
      - source: rabbitmq-config-cluster
        target: /etc/rabbitmq/conf.d/50-cluster.conf
    volumes:
      # Swarm 構成では RABBITMQ_DATA_DIR を名前付きボリュームに bind して再起動時にクラスタ再加入できるようにする
      - ${RABBITMQ_DATA_DIR:-kompira_rmq}:/var/lib/rabbitmq
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-SECRET_COOKIE}
      RABBITMQ_USE_LONGNAME: ${RABBITMQ_USE_LONGNAME:-false}
    deploy: *multi-replicated
  jobmngrd:
    hostname: "jm-{{.Node.Hostname}}"
    environment:
      <<: *required-db-env
      AMQP_URL: ${AMQP_URL:-amqp://guest:guest@mq-<<.Node.Hostname>>:5672}
    logging: *default-logging
    deploy: *multi-replicated
  kengine:
    hostname: "ke-{{.Node.Hostname}}"
    environment:
      <<: *required-db-env
      AMQP_URL: ${AMQP_URL:-amqp://guest:guest@mq-<<.Node.Hostname>>:5672}
    logging: *default-logging
    deploy: *multi-replicated
  kompira:
    hostname: "ap-{{.Node.Hostname}}"
    environment:
      <<: *required-db-env
      AMQP_URL: ${AMQP_URL:-amqp://guest:guest@mq-<<.Node.Hostname>>:5672}
    logging: *default-logging
    deploy: *multi-replicated
  nginx:
    hostname: "nx-{{.Node.Hostname}}"
    logging: *default-logging
    deploy: *multi-replicated

configs:
  rabbitmq-config-cluster:
    file: ./rabbitmq-cluster.conf
volumes:
  kompira_rmq:
