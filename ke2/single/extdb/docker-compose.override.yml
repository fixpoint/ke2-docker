x-logging:
  &default-logging
  driver: local
  # options:
  #   tag: "docker.{{.Name}}"

# 外部DB構成では postgres コンテナを起動しないため、DATABASE_URL の指定を必須とする。
# 未指定の場合は docker compose up 時にエラーで停止する。
x-required-db-env: &required-db-env
  DATABASE_URL: '${DATABASE_URL:?DATABASE_URL must be set: e.g., pgsql://user:password@host:5432/dbname}'

services:
  redis:
    logging: *default-logging
    restart: always
  rabbitmq:
    logging: *default-logging
    restart: always
  jobmngrd:
    environment:
      <<: *required-db-env
    logging: *default-logging
    depends_on:
      - rabbitmq
    restart: always
  kengine:
    environment:
      <<: *required-db-env
    volumes:
      - type: bind
        source: ./.secret_key
        target: /var/opt/kompira/.secret_key
    logging: *default-logging
    depends_on:
      - redis
      - rabbitmq
    restart: always
  kompira:
    environment:
      <<: *required-db-env
    volumes:
      - type: bind
        source: ./.secret_key
        target: /var/opt/kompira/.secret_key
    logging: *default-logging
    depends_on:
      - redis
      - kengine
    restart: always
  nginx:
    logging: *default-logging
    depends_on:
      - kompira
    restart: always
